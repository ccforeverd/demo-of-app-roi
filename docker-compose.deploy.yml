services:
  mysql:
    image: mysql:8.0
    container_name: app-roi-mysql
    restart: unless-stopped
    env_file:
      - apps/express/.env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${DB_NAME:-app_roi}
      MYSQL_USER: ${DB_USER:-app_roi_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-app_roi_pass}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./apps/express/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
    image: app-roi-fullstack:latest
    container_name: app-roi-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - apps/express/.env
      - apps/nextjs/.env
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      NEXT_PUBLIC_API_URL: /api
    ports:
      - "${APP_PORT:-3000}:3000"

volumes:
  mysql_data:
